<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Hagala Team</title>

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="/css/styles.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Favassets/icons estándar -->
    <link rel="icon" type="image/png" sizes="16x16" href="/assets/icons/favicon-16x16.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/icons/favicon-32x32.png">
    <!-- Android / Chrome -->
    <link rel="icon" type="image/png" sizes="192x192" href="/assets/icons/android-chrome-192x192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="/assets/icons/android-chrome-512x512.png">
    <!-- Apple / iOS -->
    <link rel="apple-touch-icon" sizes="180x180" href="/assets/icons/apple-touch-icon.png">
    <!-- Opcional: icono genérico -->
    <link rel="icon" type="image/png" href="/assets/icons/icon.png">
</head>
<body class="d-flex flex-column min-vh-100">
    <!-- NAVBAR -->
    <div id="navbar"></div>
    <!-- CONTENIDO PRINCIPAL -->
    <main class="container text-center mt-5 flex-grow-1">
        <h1 class="title-gd text-center mb-4">Juegos</h1>
        <section class="hero-main d-flex align-items-center text-center text-light">
            <div class="ab-wrapper">
                <div class="ab-container">
                    <!-- Elemento A (no modificado) -->
                    <a href="/routes/godnirium.html"
                        class="game-card"
                        style="background-image: url('/assets/img/godnirium.png');">
                            <img
                                src="/assets/img/godnirium_title.png"
                                alt="Godnirium"
                                class="game-title-image">
                    </a>

                    <!-- Elemento B -->
                    <div class="info-box">
                        <p class="text-gd">
                            Godnirium es nuestra primera apuesta en este mundo del desarrollo de videojuegos.
                        </p>
                    </div>
                </div>
            </div>
        </section>
    </main>
    <!-- FOOTER -->
    <div id="footer"></div>
    <!-- Bootstrap JS -->
    <script src="/js/loader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</html>
